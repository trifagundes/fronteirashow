<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Eventos Fronteira | Buscar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' },
                        surface: { light: '#ffffff', dark: '#1e293b' },
                        background: { light: '#f8fafc', dark: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen pb-20">
    
    <!-- Header Especial de Busca -->
    <header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark px-4 py-4 transition-colors duration-300 shadow-sm border-b border-slate-200 dark:border-slate-800/50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">Buscar</h1>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
        </div>
        
        <!-- Search Input -->
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="ph-bold ph-magnifying-glass text-slate-400 text-lg"></i>
            </div>
            <input type="text" placeholder="Festas, shows, categorias..." class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder-slate-400 font-medium shadow-sm">
        </div>
    </header>

    <main class="overflow-hidden" id="app-main">
        <h2 class="px-4 pt-6 pb-2 text-base font-bold text-slate-800 dark:text-slate-200 tracking-tight">Navegar por Categorias</h2>
        <!-- Container do Grid do Spotify -->
        <div id="explore-grid-container">
            <!-- Loading Skeletons -->
            <div class="grid grid-cols-2 gap-3 px-4 pb-24 pt-4">
                <div class="h-28 bg-slate-200 dark:bg-slate-800 rounded-xl animate-pulse"></div>
                <div class="h-28 bg-slate-200 dark:bg-slate-800 rounded-xl animate-pulse"></div>
                <div class="h-28 bg-slate-200 dark:bg-slate-800 rounded-xl animate-pulse"></div>
                <div class="h-28 bg-slate-200 dark:bg-slate-800 rounded-xl animate-pulse"></div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-surface-light dark:bg-surface-dark border-t border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center z-50 transition-colors duration-300 pb-safe">
        <a href="netflix.html" class="flex flex-col items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
            <i class="ph-fill ph-house text-2xl mb-1"></i>
            <span class="text-[10px] font-medium">Início</span>
        </a>
        <a href="search.html" class="flex flex-col items-center text-primary-500">
            <i class="ph-bold ph-magnifying-glass text-2xl mb-1"></i>
            <span class="text-[10px] font-medium">Buscar</span>
        </a>
        <a href="#" class="flex flex-col items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors relative">
            <i class="ph ph-heart text-2xl mb-1"></i>
            <span class="text-[10px] font-medium">Minha Lista</span>
        </a>
        <a href="#" class="flex flex-col items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
            <i class="ph ph-user text-2xl mb-1"></i>
            <span class="text-[10px] font-medium">Perfil</span>
        </a>
    </nav>

    <!-- App Scripts -->
    <script type="module" src="./js/search.js"></script>
</body>
</html>
